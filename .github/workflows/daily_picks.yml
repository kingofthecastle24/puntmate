name: PuntMate Daily Picks

on:
  # Cron disabled — generate.yml now handles scheduling and posts to Telegram
  # schedule:
  #   - cron: '0 20 * * *'
  #   - cron: '0 6 * * 5,6,0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab (for testing)

jobs:
  post_picks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PuntMate picks pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
        run: |
          cd scripts
          python main.py

      - name: Log picks to ledger
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd scripts
          python log_picks.py

      - name: Commit picks ledger
        run: |
          git config user.name "PuntMate Bot"
          git config user.email "puntmatenz@gmail.com"
          git add data/picks.json data/latest_run.json
          git diff --staged --quiet || git commit -m "chore: log picks $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Log run summary
        if: always()
        run: echo "PuntMate run completed at $(date -u)"
