# .github/workflows/generate.yml
#
# PuntMate NZ — Social: Generate, Approve & Publish
#
# Flow (all in one workflow run, so "publish" always uses the exact artifact
# "approve" reviewed — no cross-workflow staleness risk):
#   1. generate  — fetch odds, pick a value bet, render carousel + Story PNGs
#                  through the approved Brand Kit templates (Playwright),
#                  build data/social_post.json, commit everything to main for
#                  permanent history, and upload it all as a review artifact.
#                  Does NOT post anything to any platform.
#   2. approve   — pauses at the "production" environment gate. Micah reviews
#                  the artifact (or the job summary preview) and clicks Approve.
#   3. publish   — downloads THIS run's artifact and posts to Telegram,
#                  Instagram (feed + Story) and Facebook, unless dry_run is
#                  true, in which case it logs what it would have sent.
#
# Setup: Settings → Environments → production → Required reviewers → add your
# GitHub username.
#
# NOTE: daily_picks.yml is disabled legacy — leave it that way, this workflow
# replaces it.

name: PuntMate Social — Generate & Approve

concurrency:
  group: puntmate-social-pipeline
  cancel-in-progress: false

on:
  schedule:
    # 8am NZT daily (NZT = UTC+12, so 20:00 UTC the day before)
    - cron: '0 20 * * *'
    # 6pm NZT Fri/Sat/Sun for evening game coverage
    - cron: '0 6 * * 5,6,0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — render + prepare everything but do not post to any platform'
        type: boolean
        default: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Generate picks, render cards, prepare social post — no posting.
  # ─────────────────────────────────────────────────────────────────────────────
  generate:
    name: Generate picks & render cards
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # needed to commit ledger/cards/social_post.json back to main

    outputs:
      has_picks: ${{ steps.social_post.outputs.has_picks }}
      dry_run:   ${{ steps.mode.outputs.dry_run }}
      pick_id:   ${{ steps.social_post.outputs.pick_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine dry-run mode
        id: mode
        run: |
          # Manual dispatch: honour the dry_run input (defaults true).
          # Scheduled runs are always "live" (subject to the approval gate below) —
          # the whole point of the schedule is to actually publish once approved.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # Fetch odds, pick a value bet, render cards. No posting happens here.
      - name: Run picks pipeline (prepare only — no posting)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
        run: |
          cd scripts
          python main.py

      # Always renders the two fixed test fixtures (Portugal v Spain + a
      # deliberately-long-name overflow case) regardless of whether today
      # produced a real pick — catches renderer/template breakage on its own,
      # independent of odds availability. Cheap (~10s once Chromium's warm)
      # and never touches production data/cards or gets committed.
      - name: Self-test renderer (fixtures)
        id: render_selftest
        continue-on-error: true
        run: |
          mkdir -p /tmp/render_selftest
          cd scripts
          python render_brand_templates.py --test-portugal-spain --out-dir /tmp/render_selftest
          python render_brand_templates.py --test-overflow --out-dir /tmp/render_selftest

      - name: Upload renderer self-test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: puntmate-render-selftest-${{ github.run_id }}
          path: /tmp/render_selftest
          retention-days: 14
          if-no-files-found: warn

      - name: Log picks to ledger
        if: hashFiles('data/latest_run.json') != ''
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd scripts
          python log_picks.py

      - name: Build social_post.json
        id: social_post
        run: |
          cd scripts
          python build_social_post.py
          cd ..
          HAS_PICKS=$(python3 -c "import json; print(str(json.load(open('data/social_post.json')).get('has_picks', False)).lower())")
          echo "has_picks=$HAS_PICKS" >> "$GITHUB_OUTPUT"
          if [ "$HAS_PICKS" = "true" ]; then
            PICK_ID=$(python3 -c "import json; print(json.load(open('data/social_post.json'))['pick_id'])")
            echo "pick_id=$PICK_ID" >> "$GITHUB_OUTPUT"
          fi

      # Commit ledger + rendered cards + social_post.json to main — this is the
      # permanent pick history, and it's also what makes data/cards/*.png
      # publicly fetchable via raw.githubusercontent.com for Meta's Graph API.
      - name: Commit ledger, cards & social post metadata
        if: steps.social_post.outputs.has_picks == 'true'
        run: |
          git config user.name  "PuntMate Bot"
          git config user.email "puntmatenz@gmail.com"
          git add data/picks.json data/latest_run.json data/social_post.json data/cards/
          git diff --staged --quiet || git commit \
            -m "chore: prepare social post $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## PuntMate Social — Generate"
            echo ""
            if [ "${{ steps.social_post.outputs.has_picks }}" != "true" ]; then
              echo "No value pick today — nothing rendered, nothing to approve."
            else
              python3 - << 'PYEOF'
          import json
          with open('data/social_post.json') as f:
              p = json.load(f)
          print(f"| Field | Value |")
          print(f"|---|---|")
          print(f"| Match | {p.get('match','')} |")
          print(f"| Selection | {p.get('selection','')} |")
          print(f"| Market | {p.get('market','')} |")
          print(f"| Odds | {p.get('odds','')} |")
          print(f"| Look | {p.get('theme','')} |")
          print(f"| Generated at (UTC) | {p.get('generated_at','')} |")
          print(f"| Intended platforms | {', '.join(p.get('intended_platforms', []))} |")
          print()
          print("**Carousel:**")
          for path in p.get('carousel_paths', []):
              print(f"- `{path}`")
          if p.get('story_path'):
              print(f"- `{p['story_path']}` (Story)")
          PYEOF
              echo ""
              echo "Full carousel + Story images + caption are in the **puntmate-review-${{ github.run_id }}** artifact above."
              echo ""
              echo "Dry run: \`${{ steps.mode.outputs.dry_run }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review artifact
        if: steps.social_post.outputs.has_picks == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: puntmate-review-${{ github.run_id }}
          path: |
            data/social_post.json
            data/latest_run.json
            data/cards/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Approval gate — blocks until Micah approves in the Actions UI.
  # ─────────────────────────────────────────────────────────────────────────────
  approve:
    name: "⏳ Awaiting approval to publish"
    needs: generate
    if: needs.generate.outputs.has_picks == 'true'
    runs-on: ubuntu-latest
    environment: production   # ← this is the approval gate

    steps:
      - name: Approved — publish job will now run
        run: |
          echo "✅ Reviewed and approved."
          echo "Pick ID : ${{ needs.generate.outputs.pick_id }}"
          echo "Dry run : ${{ needs.generate.outputs.dry_run }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish — posts to Telegram / Instagram (feed + Story) / Facebook,
  # using the EXACT artifact from this run. Simulates instead of posting when
  # dry_run is true.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish approved post
    needs: [generate, approve]
    if: needs.generate.outputs.has_picks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit data/published/<pick_id>.json

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download this run's review artifact
        uses: actions/download-artifact@v4
        with:
          name: puntmate-review-${{ github.run_id }}
          path: .

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Publish (or simulate, if dry run)
        env:
          DRY_RUN:             ${{ needs.generate.outputs.dry_run }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          INSTAGRAM_USER_ID:   ${{ secrets.IG_USER_ID }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_TOKEN:     ${{ secrets.META_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
        run: |
          cd scripts
          python publish_pick.py

      - name: Commit publish record
        if: always()
        run: |
          git config user.name  "PuntMate Bot"
          git config user.email "puntmatenz@gmail.com"
          git add data/published/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: record publish for ${{ needs.generate.outputs.pick_id }} [skip ci]"
          git push || echo "::warning::Could not push publish record (main may have moved) — publish itself already happened; this only affects duplicate-post protection bookkeeping."

      - name: Summary
        if: always()
        run: |
          echo "## PuntMate Social — Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pick: ${{ needs.generate.outputs.pick_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: ${{ needs.generate.outputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
