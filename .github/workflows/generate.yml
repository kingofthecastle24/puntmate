# .github/workflows/generate.yml
#
# PuntMate NZ — Social: Generate, Preview, Approve & Publish
#
# One official pick per run (no personalities), classified into a RISK
# (STANDARD_PICK / RISKY_PICK / NO_BET) and a separate BET_TYPE (INVESTOR_BET
# / PUNTER_BET / GAMBLER_BET / NO_BET) — see scripts/pick_classifier.py.
#
# Flow (all in one workflow run, so "publish" always uses the exact frozen
# artifact "approve" reviewed — no cross-workflow staleness risk):
#   1. generate  — fetch odds, fetch+validate research, select ONE pick (or
#                  NO_BET), render carousel + Story PNGs, build the frozen
#                  review package (data/review/<pick_id>/ — telegram-post.txt,
#                  instagram-caption.txt, post-metadata.json, manifest.json
#                  with SHA-256 checksums, preview.html), email the approval
#                  request, commit + upload it all as a review artifact.
#                  Does NOT post anything to any platform.
#   2. approve   — pauses at the "production" environment gate. Micah reviews
#                  the Gmail preview (or the job summary / preview.html
#                  artifact if email isn't configured) and clicks Approve or
#                  Reject. Telegram, Instagram AND Facebook are all behind
#                  this SAME single gate (deliberate phase-1 behaviour — see
#                  publish_pick.py's module docstring for how this could
#                  later be split per-platform without a rearchitecture).
#   3. on_reject — if rejected/cancelled at the gate: records workflow state
#                  REJECTED (a terminal state — nothing can publish this
#                  pick_id afterwards, enforced in code by
#                  scripts/workflow_state.py) and sends the rejection email.
#   4. publish   — downloads THIS run's frozen artifact, re-verifies every
#                  checksum against manifest.json (refuses to publish on any
#                  mismatch), then posts to Telegram + Instagram (feed +
#                  Story) independently — one platform failing never blocks
#                  or rolls back another. Facebook is never posted to
#                  directly (deprecated permission — see publish_pick.py);
#                  it's reported as "expected via linked Instagram account".
#                  Sends the result email. Honors DRY_RUN — logs what would
#                  be sent without calling any API.
#
# Setup: Settings → Environments → production → Required reviewers → add your
# GitHub username. Secrets needed: see .env.example / README "Configuration"
# section (ANTHROPIC_API_KEY, ODDS_API_KEY, TELEGRAM_BOT_TOKEN,
# TELEGRAM_CHANNEL_ID, IG_USER_ID, META_PAGE_TOKEN, GMAIL_SENDER_EMAIL,
# GMAIL_APP_PASSWORD, PUNTMATE_REPORT_EMAIL). Facebook's FB_PAGE_ID secret is
# no longer used for direct posting but is harmless to leave configured.
#
# NOTE: daily_picks.yml is disabled legacy — leave it that way, this workflow
# replaces it.

name: PuntMate Social — Generate & Approve

concurrency:
  group: puntmate-social-pipeline
  cancel-in-progress: false

on:
  schedule:
    # 8am NZT daily (NZT = UTC+12, so 20:00 UTC the day before)
    - cron: '0 20 * * *'
    # 6pm NZT Fri/Sat/Sun for evening game coverage
    - cron: '0 6 * * 5,6,0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — render + prepare everything but do not post to any platform'
        type: boolean
        default: true
      force_test_pick:
        description: 'TEST ONLY — inject a synthetic pick instead of running real odds/research/Claude, to verify rendering/freeze/approval-email without waiting for a real qualifying match. Never used on schedule, never skips DRY_RUN or the approval gate.'
        type: boolean
        default: false
      auto_publish:
        description: 'TRIAL — skip the human approval gate and publish directly after the copy validator passes. Scheduled runs read config/auto_publish instead of this input.'
        type: boolean
        default: false

env:
  PYTHONPATH: scripts

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Generate one pick, render cards, freeze the review package, email preview.
  # ─────────────────────────────────────────────────────────────────────────────
  generate:
    name: Generate, render & freeze review package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # needed to commit review package/cards/state back to main

    outputs:
      has_pick: ${{ steps.review_package.outputs.has_pick }}
      has_watchlist: ${{ steps.review_package.outputs.has_watchlist }}
      dry_run:  ${{ steps.mode.outputs.dry_run }}
      pick_id:  ${{ steps.review_package.outputs.pick_id }}
      auto_publish: ${{ steps.mode.outputs.auto_publish }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine dry-run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "force_test_pick=${{ inputs.force_test_pick }}" >> "$GITHUB_OUTPUT"
            echo "auto_publish=${{ inputs.auto_publish }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "force_test_pick=false" >> "$GITHUB_OUTPUT"
            # TRIAL MODE: scheduled runs consult config/auto_publish. "true"
            # skips the human approval gate — the deterministic copy
            # validator (hard-fails the generate job on any violation, so
            # nothing downstream ever runs) is then the only gate. See
            # config/README.md; flip that file to "false" to end the trial.
            if [ "$(cat config/auto_publish 2>/dev/null | tr -d '[:space:]')" = "true" ]; then
              echo "auto_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "auto_publish=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run picks pipeline (prepare only — no posting)
        if: steps.mode.outputs.force_test_pick != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
        run: |
          cd scripts
          python main.py

      # TEST ONLY (force_test_pick=true) — skips real odds/research/Claude and
      # writes a synthetic pick instead, then renders it through the exact
      # same Playwright renderer as production. Everything downstream
      # (freeze/checksums/email/approval gate/publish) is completely
      # unmodified — this only replaces "find a real pick today".
      - name: Inject synthetic TEST pick
        if: steps.mode.outputs.force_test_pick == 'true'
        run: |
          cd scripts
          python inject_test_pick.py
          python render_latest_pick.py

      # Always renders the two fixed test fixtures regardless of whether
      # today produced a real pick — catches renderer/template breakage on
      # its own, independent of odds availability.
      - name: Self-test renderer (fixtures)
        id: render_selftest
        continue-on-error: true
        run: |
          mkdir -p data/cards/_selftest
          cd scripts
          python render_brand_templates.py --test-portugal-spain --out-dir ../data/cards/_selftest
          python render_brand_templates.py --test-overflow --out-dir ../data/cards/_selftest

      - name: Upload renderer self-test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: puntmate-render-selftest-${{ github.run_id }}
          path: data/cards/_selftest
          retention-days: 14
          if-no-files-found: warn

      - name: Commit renderer self-test images
        if: always()
        run: |
          git add data/cards/_selftest/
          bash scripts/git_push_retry.sh "chore: update renderer self-test reference images [skip ci]" --soft

      - name: Log pick to ledger
        if: hashFiles('data/latest_run.json') != ''
        run: |
          cd scripts
          python log_picks.py

      - name: Build frozen review package (checksums + copy assets)
        id: review_package
        env:
          # Threaded through so build_review_package.py AND the inline PICK_ID
          # computation below derive the identical dry-run pick_id suffix from
          # one source of truth (build_review_package._pick_id_suffix) —
          # see that module's docstring for why dry-run runs need their own
          # pick_id namespace (must never collide with a same-day live run).
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          cd scripts
          python build_review_package.py
          cd ..
          if [ -f data/latest_run.json ]; then
            HAS_PICK=$(python3 -c "import json; d=json.load(open('data/latest_run.json')); print(str(d.get('pick',{}).get('has_pick', False)).lower())")
          else
            HAS_PICK=false
          fi
          echo "has_pick=$HAS_PICK" >> "$GITHUB_OUTPUT"
          if [ -f data/latest_run.json ]; then
            HAS_WATCHLIST=$(python3 -c "import json; d=json.load(open('data/latest_run.json')); print(str(bool(d.get('watchlist'))).lower())")
          else
            HAS_WATCHLIST=false
          fi
          echo "has_watchlist=$HAS_WATCHLIST" >> "$GITHUB_OUTPUT"
          if [ "$HAS_PICK" = "true" ] || [ "$HAS_WATCHLIST" = "true" ]; then
            PICK_ID=$(python3 -c "
          import json, os, glob, sys
          d = json.load(open('data/latest_run.json'))
          pick = d.get('pick') or {}
          sys.path.insert(0, 'scripts')
          from render_brand_templates import slugify
          from build_review_package import _pick_id_suffix
          if pick.get('has_pick'):
              print(f\"{d['run_date']}_{slugify(pick['match'])}{_pick_id_suffix()}\")
          else:
              print(f\"{d['run_date']}_no-bet{_pick_id_suffix()}\")
          ")
            echo "pick_id=$PICK_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Send approval-preview email (or No-Bet notice)
        if: always() && hashFiles('data/latest_run.json') != ''
        env:
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          PUNTMATE_REPORT_EMAIL: ${{ secrets.PUNTMATE_REPORT_EMAIL }}
          PICK_ID: ${{ steps.review_package.outputs.pick_id }}
        run: |
          cd scripts
          python send_preview.py

      # Commit the frozen review package + ledger + state — this is the
      # permanent pick history, and it's also what makes data/review/**/*.png
      # publicly fetchable via raw.githubusercontent.com for Meta's Graph API.
      - name: Commit ledger, review package & state
        if: steps.review_package.outputs.has_pick == 'true' || steps.review_package.outputs.has_watchlist == 'true'
        run: |
          git add data/picks.json data/latest_run.json data/review/ data/state/ data/cards/
          bash scripts/git_push_retry.sh "chore: prepare social post $(date -u +%Y-%m-%d) [skip ci]"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## PuntMate Social — Generate"
            echo ""
            if [ "${{ steps.review_package.outputs.has_pick }}" != "true" ]; then
              echo "No defensible pick today (NO_BET) — nothing rendered, nothing to approve."
              if [ -f data/latest_run.json ]; then
                python3 -c "import json; print('Reason:', json.load(open('data/latest_run.json'))['pick'].get('reasoning',''))"
              fi
            else
              PICK_ID="${{ steps.review_package.outputs.pick_id }}"
              python3 - << PYEOF
          import json
          with open(f"data/review/${PICK_ID}/post-metadata.json") as f:
              p = json.load(f)
          print("| Field | Value |")
          print("|---|---|")
          print(f"| Match | {p.get('match','')} |")
          print(f"| Selection | {p.get('selection','')} |")
          print(f"| Market | {p.get('market','')} |")
          print(f"| Odds | {p.get('odds','')} |")
          print(f"| Bet type | {p.get('bet_type_label','')} |")
          print(f"| Classification | {p.get('classification','')} |")
          print(f"| Confidence | {p.get('confidence_label','')} |")
          print(f"| Generated at (UTC) | {p.get('generated_at','')} |")
          print(f"| Intended platforms | {', '.join(p.get('intended_platforms', []))} |")
          PYEOF
              echo ""
              echo "Full review package (texts, images, manifest, preview.html) is in the **puntmate-review-${{ github.run_id }}** artifact above, and committed at \`data/review/${PICK_ID}/\`."
              echo ""
              echo "Dry run: \`${{ steps.mode.outputs.dry_run }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review artifact
        if: steps.review_package.outputs.has_pick == 'true' || steps.review_package.outputs.has_watchlist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: puntmate-review-${{ github.run_id }}
          path: |
            data/review/${{ steps.review_package.outputs.pick_id }}/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Approval gate — blocks until Micah approves or rejects in the UI.
  # ─────────────────────────────────────────────────────────────────────────────
  approve:
    name: "⏳ Awaiting approval to publish"
    needs: generate
    if: (needs.generate.outputs.has_pick == 'true' || needs.generate.outputs.has_watchlist == 'true') && needs.generate.outputs.auto_publish != 'true'
    runs-on: ubuntu-latest
    environment: production   # ← this is the approval gate (Telegram + Instagram + Facebook all wait here)

    steps:
      - name: Approved — publish job will now run
        run: |
          echo "✅ Reviewed and approved."
          echo "Pick ID : ${{ needs.generate.outputs.pick_id }}"
          echo "Dry run : ${{ needs.generate.outputs.dry_run }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Rejection handling — runs only if the approval gate was rejected or
  # cancelled (never on success, never on skip). Records REJECTED as a
  # terminal state and sends the rejection email. The publish job's `if`
  # below explicitly requires needs.approve.result == 'success', so a
  # rejected run can never reach publish even if this job fails too.
  # ─────────────────────────────────────────────────────────────────────────────
  on_reject:
    name: Record rejection
    needs: [generate, approve]
    if: always() && (needs.generate.outputs.has_pick == 'true' || needs.generate.outputs.has_watchlist == 'true') && needs.generate.outputs.auto_publish != 'true' && needs.approve.result != 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Record REJECTED state + send rejection email
        env:
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          PUNTMATE_REPORT_EMAIL: ${{ secrets.PUNTMATE_REPORT_EMAIL }}
          PICK_ID: ${{ needs.generate.outputs.pick_id }}
        run: |
          cd scripts
          python handle_rejection.py

      - name: Commit rejected state
        run: |
          git add data/state/
          bash scripts/git_push_retry.sh "chore: record rejection for ${{ needs.generate.outputs.pick_id }} [skip ci]" --soft

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Publish — posts to Telegram / Instagram (feed + Story) using the
  # EXACT frozen + checksum-verified artifact from this run. Facebook is
  # reported as "via linked Instagram account", never posted to directly.
  # Simulates instead of posting when dry_run is true.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish approved post
    needs: [generate, approve]
    if: always() && (needs.generate.outputs.has_pick == 'true' || needs.generate.outputs.has_watchlist == 'true') && (needs.approve.result == 'success' || needs.generate.outputs.auto_publish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit data/published/<pick_id>.json + state

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download this run's review artifact (overwrite with the frozen copy)
        uses: actions/download-artifact@v4
        with:
          name: puntmate-review-${{ github.run_id }}
          path: data/review/${{ needs.generate.outputs.pick_id }}/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Publish (or simulate, if dry run)
        env:
          DRY_RUN:             ${{ needs.generate.outputs.dry_run }}
          AUTO_PUBLISH:        ${{ needs.generate.outputs.auto_publish }}
          PICK_ID:              ${{ needs.generate.outputs.pick_id }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          INSTAGRAM_USER_ID:   ${{ secrets.IG_USER_ID }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_TOKEN:     ${{ secrets.META_PAGE_TOKEN }}
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          PUNTMATE_REPORT_EMAIL: ${{ secrets.PUNTMATE_REPORT_EMAIL }}
        run: |
          cd scripts
          if [ "${{ needs.generate.outputs.has_pick }}" = "true" ]; then
            python publish_pick.py
          else
            # Phase 4: No-Bet day with a watchlist — Telegram-only text post.
            python publish_watchlist.py
          fi

      - name: Commit publish record + state
        if: always()
        run: |
          git add data/published/ data/state/ 2>/dev/null || true
          bash scripts/git_push_retry.sh "chore: record publish for ${{ needs.generate.outputs.pick_id }} [skip ci]" --soft

      - name: Summary
        if: always()
        run: |
          echo "## PuntMate Social — Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pick: ${{ needs.generate.outputs.pick_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: ${{ needs.generate.outputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
