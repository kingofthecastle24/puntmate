# .github/workflows/publish.yml
#
# PuntMate NZ — Social: Manual Republish
#
# NOT part of the normal daily flow anymore — generate.yml now runs
# generate → approve → publish end to end in one workflow run, using that
# run's own artifact, so publishing can never drift from what was approved.
#
# This workflow is kept only for manual retries: if a live publish partially
# failed (e.g. Facebook succeeded but Instagram Story didn't) and you want to
# re-run just the publish step without regenerating a new pick, run this
# against whatever data/social_post.json is currently committed on main.
#
# Duplicate protection still applies: publish_pick.py checks
# data/published/<pick_id>.json before sending anything, so re-running this
# is safe even for platforms that already succeeded — remove that file first
# (or edit it) if you deliberately want to resend everything.

name: PuntMate Social - Manual Republish

on:
  workflow_dispatch:
    inputs:
      pick_id:
        description: 'pick_id to (re)publish, e.g. 2026-07-22_Parramatta_Eels_vs_Penrith_Panthers (its data/review/<pick_id>/ folder must exist on main)'
        type: string
        required: true
      resend_failed:
        description: 'Resend ONLY the platforms that did not already succeed (safe partial-failure retry — never re-posts Telegram if it already went out)'
        type: boolean
        default: true
      dry_run:
        description: 'Dry run — log what would be sent without posting'
        type: boolean
        default: true

jobs:
  publish:
    name: Republish current data/social_post.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install dependencies
        run: pip install requests

      - name: Publish (or simulate, if dry run)
        env:
          DRY_RUN:             ${{ inputs.dry_run }}
          RESEND_FAILED:       ${{ inputs.resend_failed }}
          PICK_ID:             ${{ inputs.pick_id }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          INSTAGRAM_USER_ID:   ${{ secrets.IG_USER_ID }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_TOKEN:     ${{ secrets.META_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: |
          cd scripts
          python publish_pick.py

      - name: Commit publish record
        if: always()
        run: |
          git config user.name  "PuntMate Bot"
          git config user.email "puntmatenz@gmail.com"
          git add data/published/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: record manual republish [skip ci]"
          git push || echo "::warning::Could not push publish record — republish itself already happened."

      - name: Summary
        if: always()
        run: echo "Manual republish finished at $(date -u)" >> "$GITHUB_STEP_SUMMARY"
