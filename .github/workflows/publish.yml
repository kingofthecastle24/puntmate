# .github/workflows/publish.yml
#
# PuntMate NZ — Social: Publish
#
# Triggered automatically after Micah approves the post in generate.yml
# (the "production" environment gate completing = workflow_run success).
# Can also be triggered manually for retries.
#
# Posts to:
#   Facebook — single photo post:
#     POST /{page-id}/photos (with image URL + caption)
#     Falls back to POST /{page-id}/feed if no image is available
#   Instagram — skipped if IG_USER_ID secret is not set
#
# Reads data/social_post.json committed by generate.yml. No picks re-generation.
#
# Secrets required (add at Settings → Secrets → Actions):
#   META_PAGE_TOKEN  — Page access token
#   FB_PAGE_ID       — Facebook Page ID
#   IG_USER_ID       — (optional) Instagram Business account user ID

name: PuntMate Social — Publish

on:
  workflow_run:
    # Must match the name: field in generate.yml exactly
    workflows: ["PuntMate Social — Generate & Approve"]
    types: [completed]
  workflow_dispatch:
    # Manual trigger — use for retries or testing without running the full pipeline

jobs:
  publish:
    name: Post to Instagram & Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Run only if the triggering generate.yml workflow succeeded (meaning Micah approved),
    # OR if this was triggered manually via workflow_dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          # Check out main explicitly — generate.yml commits data/social_post.json
          # to main before completing, so HEAD of main is what we want here.
          ref: main

      - name: Install requests
        run: pip install requests --quiet

      # ── Instagram ────────────────────────────────────────────────────────────
      # Meta Content Publishing API requires a two-step flow:
      #   1. Create container (Meta fetches the image from Imgur and processes it)
      #   2. Publish the container (makes the post live)
      # A 5-second wait between steps gives Meta time to process the image.
      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time
          import requests

          IG_USER_ID = os.environ.get('IG_USER_ID', '').strip()
          TOKEN      = os.environ.get('META_PAGE_TOKEN', '').strip()
          GRAPH      = "https://graph.facebook.com/v19.0"

          if not IG_USER_ID or not TOKEN:
              print("::notice::IG_USER_ID not set — Instagram posting skipped")
              sys.exit(0)

          with open('data/social_post.json') as f:
              post = json.load(f)

          image_url = post.get('image_url', '').strip()
          caption   = post.get('caption', '')

          if not image_url:
              print("::warning::No image URL in social_post.json — skipping Instagram post")
              sys.exit(0)

          # Step 1: Create media container
          print(f"Creating IG media container for image: {image_url}")
          resp = requests.post(
              f"{GRAPH}/{IG_USER_ID}/media",
              data={
                  "image_url":    image_url,
                  "caption":      caption,
                  "access_token": TOKEN,
              },
              timeout=30,
          )
          result = resp.json()
          if "error" in result:
              print(f"::error::IG container error: {result['error']}")
              sys.exit(1)
          container_id = result["id"]
          print(f"✅ Container created: {container_id}")

          # Wait for Meta to fetch and process the image before publishing
          print("Waiting 5s for container to process...")
          time.sleep(5)

          # Step 2: Publish the container
          print("Publishing to Instagram...")
          resp = requests.post(
              f"{GRAPH}/{IG_USER_ID}/media_publish",
              data={
                  "creation_id":  container_id,
                  "access_token": TOKEN,
              },
              timeout=30,
          )
          result = resp.json()
          if "error" in result:
              print(f"::error::IG publish error: {result['error']}")
              sys.exit(1)
          print(f"✅ Posted to Instagram: {result.get('id')}")
          PYEOF

      # ── Facebook ─────────────────────────────────────────────────────────────
      # If an image URL is available, post to /{page-id}/photos so the image
      # appears natively in the feed. Falls back to a text-only feed post.
      - name: Post to Facebook
        env:
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          import requests

          PAGE_ID = os.environ.get('FB_PAGE_ID', '').strip()
          TOKEN   = os.environ.get('META_PAGE_TOKEN', '').strip()
          GRAPH   = "https://graph.facebook.com/v19.0"

          if not PAGE_ID or not TOKEN:
              print("::error::FB_PAGE_ID or META_PAGE_TOKEN not set — skipping Facebook")
              sys.exit(1)

          with open('data/social_post.json') as f:
              post = json.load(f)

          image_url = post.get('image_url', '').strip()
          caption   = post.get('caption', '')

          if image_url:
              # Photo post — image rendered natively in the Facebook feed
              print(f"Posting photo to Facebook Page (image: {image_url})...")
              resp = requests.post(
                  f"{GRAPH}/{PAGE_ID}/photos",
                  data={
                      "url":          image_url,
                      "caption":      caption,
                      "access_token": TOKEN,
                  },
                  timeout=30,
              )
          else:
              # Fallback: text-only feed post if catbox.moe upload failed earlier
              print("::warning::No image URL — falling back to text-only Facebook post")
              resp = requests.post(
                  f"{GRAPH}/{PAGE_ID}/feed",
                  data={
                      "message":      caption,
                      "access_token": TOKEN,
                  },
                  timeout=30,
              )

          result = resp.json()
          if "error" in result:
              print(f"::error::Facebook error: {result['error']}")
              sys.exit(1)

          post_id = result.get('id') or result.get('post_id')
          print(f"✅ Posted to Facebook: {post_id}")
          PYEOF

      - name: Summary
        if: always()
        run: echo "PuntMate social post published at $(date -u)"
