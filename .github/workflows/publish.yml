# .github/workflows/publish.yml
#
# PuntMate NZ - Social: Publish
#
# Triggered automatically after Micah approves the post in generate.yml
# (the "production" environment gate completing = workflow_run success).
# Can also be triggered manually for retries.
#
# Reads data/social_post.json committed by generate.yml. No picks re-generation.
# Set is_story: true in social_post.json to post as an Instagram Story.
#
# Secrets required:
#   META_PAGE_TOKEN  - Page access token
#   FB_PAGE_ID       - Facebook Page ID
#   IG_USER_ID       - (optional) Instagram Business account user ID

name: PuntMate Social - Publish

on:
  workflow_run:
    workflows: ["PuntMate Social - Generate & Approve"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    name: Post to Instagram & Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install requests
        run: pip install requests --quiet

      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, time
          import requests

          IG_USER_ID = os.environ.get('IG_USER_ID', '').strip()
          TOKEN      = os.environ.get('META_PAGE_TOKEN', '').strip()
          GRAPH      = "https://graph.facebook.com/v19.0"

          if not IG_USER_ID or not TOKEN:
              print("::notice::IG_USER_ID not set - Instagram posting skipped")
              sys.exit(0)

          with open('data/social_post.json') as f:
              post = json.load(f)

          image_url = post.get('image_url', '').strip()
          caption   = post.get('caption', '')
          is_story  = post.get('is_story', False)

          if not image_url:
              print("::warning::No image URL - skipping Instagram post")
              sys.exit(0)

          ig_data = {"image_url": image_url, "access_token": TOKEN}
          if is_story:
              ig_data["media_type"] = "STORIES"
          else:
              ig_data["caption"] = caption

          print(f"Creating IG container (story={is_story}): {image_url}")
          resp = requests.post(
              f"{GRAPH}/{IG_USER_ID}/media",
              data=ig_data,
              timeout=30,
          )
          result = resp.json()
          if "error" in result:
              print(f"::error::IG container error: {result['error']}")
              sys.exit(1)
          container_id = result["id"]
          print(f"Container created: {container_id}")

          print("Waiting 5s for container to process...")
          time.sleep(5)

          print("Publishing to Instagram...")
          resp = requests.post(
              f"{GRAPH}/{IG_USER_ID}/media_publish",
              data={"creation_id": container_id, "access_token": TOKEN},
              timeout=30,
          )
          result = resp.json()
          if "error" in result:
              print(f"::error::IG publish error: {result['error']}")
              sys.exit(1)
          print(f"Posted to Instagram: {result.get('id')}")
          PYEOF

      - name: Post to Facebook
        continue-on-error: true
        env:
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          import requests

          PAGE_ID = os.environ.get('FB_PAGE_ID', '').strip()
          TOKEN   = os.environ.get('META_PAGE_TOKEN', '').strip()
          GRAPH   = "https://graph.facebook.com/v19.0"

          if not PAGE_ID or not TOKEN:
              print("::error::FB_PAGE_ID or META_PAGE_TOKEN not set")
              sys.exit(1)

          with open('data/social_post.json') as f:
              post = json.load(f)

          image_url = post.get('image_url', '').strip()
          caption   = post.get('caption', '')

          if image_url:
              print(f"Posting photo to Facebook (image: {image_url})...")
              resp = requests.post(
                  f"{GRAPH}/{PAGE_ID}/photos",
                  data={"url": image_url, "caption": caption, "access_token": TOKEN},
                  timeout=30,
              )
          else:
              print("::warning::No image URL - falling back to text-only post")
              resp = requests.post(
                  f"{GRAPH}/{PAGE_ID}/feed",
                  data={"message": caption, "access_token": TOKEN},
                  timeout=30,
              )

          result = resp.json()
          if "error" in result:
              print(f"::error::Facebook error: {result['error']}")
              sys.exit(1)

          post_id = result.get('id') or result.get('post_id')
          print(f"Posted to Facebook: {post_id}")
          PYEOF

      - name: Summary
        if: always()
        run: echo "PuntMate social post published at $(date -u)"
