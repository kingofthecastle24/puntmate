name: PuntMate R19 — Post Now
on:
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pillow requests --quiet
      - name: Download fonts
        run: |
          mkdir -p fonts
          BASE="https://github.com/google/fonts/raw/main/ofl"
          curl -fsSL "$BASE/archivo/Archivo%5Bwdth%2Cwght%5D.ttf" -o fonts/Archivo-Black.ttf 2>/dev/null || curl -fsSL "https://fonts.gstatic.com/s/archivoblack/v21/HTxqL289NzCGg4MkRbTuR4h59N2jWg.ttf" -o fonts/Archivo-Black.ttf || echo "Archivo fallback to system"
          curl -fsSL "https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gx63OHpQ4yY.ttf" -o fonts/SpaceGrotesk-Medium.ttf || echo "SpaceGrotesk-Medium fallback"
          curl -fsSL "https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gx6dOTpQ4yY.ttf" -o fonts/SpaceGrotesk-Bold.ttf || echo "SpaceGrotesk-Bold fallback"
          curl -fsSL "https://fonts.gstatic.com/s/spacemono/v13/i7dPIFZifjKcF5UAWdDRYEF8RQ.ttf" -o fonts/SpaceMono-Regular.ttf || echo "SpaceMono-Regular fallback"
          curl -fsSL "https://fonts.gstatic.com/s/spacemono/v13/i7dMIFZifjKcF5UAWdDRaPpZYFKQHwyVd3U.ttf" -o fonts/SpaceMono-Bold.ttf || echo "SpaceMono-Bold fallback"
          ls -lh fonts/ 2>/dev/null || echo "No fonts dir"
      - name: Generate + Post
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAN: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FB_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          FB_PAGE: ${{ secrets.FB_PAGE_ID }}
        run: |
          python3 - <<'PYEOF'
          import sys, os
          sys.path.insert(0, "scripts")
          from generate_picks_image import generate_carousel, generate_multi_images
          import requests

          OUT = "data/cards"
          os.makedirs(OUT, exist_ok=True)

          FOOTER = "R18 · Gamble responsibly · 0800 654 655 · gamblinghelpline.co.nz"
          TG_BOT  = os.environ["TG_BOT"]
          TG_CHAN  = os.environ["TG_CHAN"]
          FB_TOKEN = os.environ.get("FB_TOKEN", "")
          FB_PAGE  = os.environ.get("FB_PAGE", "")

          single = {
            "match": "Storm vs Titans", "home_team": "Melbourne Storm",
            "away_team": "Gold Coast Titans", "selection": "Storm to Win",
            "odds": "1.40", "market": "Head to Head", "sport_label": "NRL 2026",
            "sport_tag": "NRL", "cover_theme": "Banker of the Day",
            "analysis": "Storm are the benchmark at AAMI Park. Titans winless away in seven straight. Back the class side.",
            "confidence": 4, "riskTagline": "LOW RISK · BANKER PLAY · BACK THE STORM", "big_game": False,
          }
          legs = [
            {"match": "Storm vs Titans", "selection": "Storm to Win", "market": "H2H", "odds": "1.40"},
            {"match": "Tigers vs Warriors", "selection": "Warriors to Win", "market": "H2H", "odds": "1.40"},
            {"match": "Dolphins vs Sharks", "selection": "Dolphins to Win", "market": "H2H", "odds": "1.52"},
          ]
          meta = {
            "palette": "night", "coverKicker": "MULTI MONDAY",
            "analysis": "Three home-side plays. Storm and Warriors face bottom-half opponents. Dolphins at value.",
            "confidence": 3, "confidenceLabel": "MODERATE",
            "riskTagline": "HIGHER RISK · BIGGER RETURN · HOME TREBLE",
            "handle": "@puntmatenz", "multiType": "Multi", "stake": "10", "combinedOdds": "$2.98",
          }
          spaths = generate_carousel(single, OUT)
          mpaths = generate_multi_images(legs, meta, OUT)
          print("Generated:", spaths[0], mpaths[0])

          def tg_photo(path, caption):
            with open(path, "rb") as f:
              r = requests.post(f"https://api.telegram.org/bot{TG_BOT}/sendPhoto",
                data={"chat_id": TG_CHAN, "caption": caption, "parse_mode": "Markdown"},
                files={"photo": f}, timeout=30)
            j = r.json()
            print("TG", path.split("/")[-1], "ok:", j.get("ok"), j.get("description",""))
            return j

          def fb_photo(path, caption):
            if not FB_TOKEN or not FB_PAGE:
              print("FB skipped"); return
            with open(path, "rb") as f:
              ir = requests.post("https://api.imgur.com/3/image",
                headers={"Authorization": "Client-ID 546c25a59c58ad7"},
                files={"image": f}, timeout=30)
            ij = ir.json()
            if not ij.get("success"):
              print("Imgur failed:", ij); return
            img_url = ij["data"]["link"]
            r = requests.post(f"https://graph.facebook.com/v19.0/{FB_PAGE}/photos",
              data={"url": img_url, "caption": caption, "access_token": FB_TOKEN}, timeout=30)
            j = r.json()
            print("FB", j.get("id"), j.get("error",""))

          banker_caption = f"🎯 *STORM TO WIN @ 1.40 | NRL R19*\nBanker play. Class side at home.\n_{FOOTER}_"
          multi_caption  = f"🔥 *HOME TREBLE | NRL R19*\nStorm 1.40 + Warriors 1.40 + Dolphins 1.52 = *$2.98*\n_{FOOTER}_"
          fb_banker = banker_caption.replace("*","").replace("_","")
          fb_multi  = multi_caption.replace("*","").replace("_","")

          tg_photo(spaths[0], banker_caption)
          tg_photo(mpaths[0], multi_caption)
          fb_photo(spaths[0], fb_banker)
          fb_photo(mpaths[0], fb_multi)
          PYEOF
