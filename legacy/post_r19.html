function log(msg) { document.getElementById('log').textContent += '\n' + msg; }

function b64toBlob(b64, type='image/png') {
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], {type});
}

async function sendPhoto(b64, caption) {
  const blob = b64toBlob(b64);
  const fd = new FormData();
  fd.append('chat_id', chatId);
  fd.append('photo', blob, 'card.png');
  fd.append('caption', caption);
  fd.append('parse_mode', 'Markdown');
  try {
    const r = await fetch('https://api.telegram.org/bot' + token + '/sendPhoto', {method: 'POST', body: fd});
    const j = await r.json();
    return j;
  } catch(e) {
    return {ok: false, error: e.message};
  }
}

(async () => {
  log('Posting banker card...');
  const r1 = await sendPhoto(img1, cap1);
  log(r1.ok ? '✅ Banker posted! message_id=' + r1.result.message_id : '❌ Error: ' + JSON.stringify(r1));
  log('Posting multi card...');
  const r2 = await sendPhoto(img2, cap2);
  log(r2.ok ? '✅ Multi posted! message_id=' + r2.result.message_id : '❌ Error: ' + JSON.stringify(r2));
  log('Done!');
  document.getElementById('log').id = 'done';
})();
